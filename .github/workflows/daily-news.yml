name: Daily AI News Update

on:
  schedule:
    # 8 AM Egypt (UTC+2) = 06:00 UTC, 5 PM Egypt = 15:00 UTC
    - cron: "0 6,15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch and summarize news
        env:
          GITHUB_TOKEN: ${{ secrets.GH_MODELS_TOKEN || secrets.GITHUB_TOKEN }}
          GH_MODELS_MODEL: "openai/gpt-4o-mini"
        run: python scripts/update_news.py

      - name: Send email digest
        if: hashFiles('site/data/email.html') != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_ADDRESS }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "AI Signal — ${{ github.event.repository.name }} digest"
          to: ${{ secrets.GMAIL_ADDRESS }}
          from: "Sublime AI Signal <${{ secrets.GMAIL_ADDRESS }}>"
          html_body: file://site/data/email.html
        continue-on-error: true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/data/news.json
          rm -f site/data/email.html
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "signal: update daily AI news digest"
          git push
